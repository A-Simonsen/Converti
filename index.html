<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Converti</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <nav id="tool-sidebar">
      <div id="tool-list"></div>
    </nav>

    <main id="tool-content">
      <div id="empty-state" class="empty-state">
        <span class="empty-icon">🧰</span>
        <p>Select a tool to get started</p>
      </div>

      <div id="tool-view" class="tool-view hidden">
        <header class="tool-header">
          <h1 id="tool-name"></h1>
          <p id="tool-description" class="tool-description"></p>
        </header>

        <div id="tool-options" class="tool-options"></div>

        <section id="preview-section" class="preview-section hidden">
          <div class="preview-header">
            <span class="preview-label">Live Preview</span>
            <button id="copy-preview-btn" class="btn btn-ghost preview-copy-btn">Copy</button>
          </div>
          <textarea id="preview-text" class="preview-text" readonly spellcheck="false"></textarea>
        </section>

        <div class="output-section">
          <button id="pick-output-btn" class="btn btn-ghost">📁 Output folder</button>
          <div id="output-folder-info" class="folder-info hidden">
            <span id="output-folder-path" class="folder-path"></span>
            <button id="clear-output-btn" class="btn-icon" title="Clear">✕</button>
          </div>
        </div>

        <button id="convert-btn" class="btn btn-primary">Convert</button>

        <div id="progress-area" class="progress-area hidden">
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text"></span>
        </div>

        <div id="status-message" class="status-message hidden"></div>
      </div>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
